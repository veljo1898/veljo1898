<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Practice</title>

    <style>
        /* Center everything on the page */
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        /* Container for the boxes */
        .container{
            display: flex;
            gap: 20px;
        }

        /* Common style for all boxes */
        .box{
            width: 150px;
            height: 150px;
            color: white;
            font-size: 20px;
            font-weight: bold;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Individual colors */
        .box1{
            background: red;
        }

        .box2{
            background: green;
        }

        .box3{
            background: blue;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box box1">Box 1</div>
        <div class="box box2">Box 2</div>
        <div class="box box3">Box 3</div>
    </div>

</body>
</html>
